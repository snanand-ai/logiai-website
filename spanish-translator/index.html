<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Two-Way Voice Translator — English ⇄ Spanish</title>
  <meta name="description" content="Two-way live voice translator. Tap your language, speak, and the other person hears it in theirs. English and Spanish." />
  <style>
    :root {
      --bg1:#0f172a; --card:#1e293b;
      --en:#38bdf8; --en-deep:#0284c7;
      --es:#f97316; --es-deep:#ea580c;
      --text:#e2e8f0; --muted:#94a3b8; --border:#334155;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, #1e293b, var(--bg1));
      color:var(--text);
      display:flex; flex-direction:column; align-items:center;
      padding:1rem 1rem 1.2rem;
    }
    header { text-align:center; margin-bottom:.8rem; }
    h1 { font-size:clamp(1.2rem,4.5vw,1.7rem); line-height:1.2; }
    h1 .en { color:var(--en); } h1 .es { color:var(--es); }
    .sub { color:var(--muted); font-size:.85rem; margin-top:.25rem; }

    .app { width:100%; max-width:600px; display:flex; flex-direction:column; flex:1; min-height:0; }

    /* Conversation transcript */
    .convo {
      flex:1; min-height:200px; overflow-y:auto;
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:1rem; display:flex; flex-direction:column; gap:.75rem;
    }
    .empty { margin:auto; text-align:center; color:#5b6b82; font-size:.95rem; line-height:1.6; }
    .bubble {
      max-width:85%; padding:.7rem .9rem; border-radius:14px;
      border:1px solid var(--border); background:rgba(15,23,42,.5);
    }
    .bubble.en { align-self:flex-start; border-left:3px solid var(--en); }
    .bubble.es { align-self:flex-end;   border-right:3px solid var(--es); }
    .bubble .who {
      font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
      color:var(--muted); margin-bottom:.3rem; display:flex; align-items:center; gap:.35rem;
    }
    .bubble .orig { font-size:.92rem; color:var(--muted); }
    .bubble .trans { font-size:1.12rem; font-weight:500; margin-top:.2rem; }
    .bubble.en .trans { color:var(--es); }
    .bubble.es .trans { color:var(--en); }
    .bubble .replay {
      margin-top:.35rem; font-size:.78rem; color:var(--muted);
      background:none; border:none; cursor:pointer; padding:0; display:inline-flex; gap:.25rem; align-items:center;
    }
    .bubble.interim { opacity:.7; font-style:italic; }

    .status { text-align:center; min-height:1.25rem; font-size:.88rem; color:var(--muted); margin:.7rem 0 .55rem; }
    .status.error { color:#f87171; font-weight:600; }
    .status.live { color:var(--text); font-weight:600; }

    /* Language buttons */
    .mics { display:flex; gap:.75rem; }
    .mic {
      flex:1; font:inherit; font-weight:700; cursor:pointer;
      border-radius:14px; padding:1rem .6rem; color:#0f172a;
      border:2px solid transparent; transition:transform .08s ease, filter .15s ease;
      display:flex; flex-direction:column; align-items:center; gap:.2rem; line-height:1.1;
    }
    .mic .flag { font-size:1.5rem; }
    .mic .lbl { font-size:1rem; }
    .mic small { font-weight:600; opacity:.7; font-size:.72rem; }
    .mic.en { background:linear-gradient(135deg,var(--en),#7dd3fc); }
    .mic.es { background:linear-gradient(135deg,var(--es),#fbbf24); }
    .mic:active { transform:scale(.97); }
    .mic.listening { animation:pulse 1.2s infinite; color:#fff; }
    .mic.en.listening { background:var(--en-deep); }
    .mic.es.listening { background:var(--es-deep); }
    .mic.dim { filter:saturate(.4) brightness(.8); }
    @keyframes pulse {
      0%{box-shadow:0 0 0 0 rgba(255,255,255,.45);}
      70%{box-shadow:0 0 0 13px rgba(255,255,255,0);}
      100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
    }

    .footer { display:flex; align-items:center; justify-content:space-between; margin-top:.8rem; font-size:.85rem; color:var(--muted); }
    .footer label { display:flex; align-items:center; gap:.4rem; cursor:pointer; }
    .footer button { background:none; border:none; color:var(--muted); cursor:pointer; font:inherit; text-decoration:underline; }
  </style>
</head>
<body>
  <header>
    <h1><span class="en">English</span> ⇄ <span class="es">Español</span></h1>
    <div class="sub">Tap your language, speak, and they hear it in theirs.</div>
  </header>

  <div class="app">
    <div id="convo" class="convo">
      <div id="empty" class="empty">
        🗣️ Tap a button below and start talking.<br>
        Tap <strong>English</strong> to speak English (they hear Spanish).<br>
        Tap <strong>Español</strong> to speak Spanish (they hear English).
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="mics">
      <button id="micEn" class="mic en" data-lang="en">
        <span class="flag">🇬🇧</span>
        <span class="lbl">English</span>
        <small>tap &amp; speak</small>
      </button>
      <button id="micEs" class="mic es" data-lang="es">
        <span class="flag">🇪🇸</span>
        <span class="lbl">Español</span>
        <small>toca y habla</small>
      </button>
    </div>

    <div class="footer">
      <label><input type="checkbox" id="speakToggle" checked /> Speak translations aloud</label>
      <button id="clearBtn">Clear chat</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
